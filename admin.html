<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - Dari Rumah untuk Bumi</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page">
    <div class="decor-dots"><span></span><span></span><span></span></div>
    <h1>Panel Admin</h1>
    <p class="subtitle">Lihat semua skor peserta quiz "Dari Rumah untuk Bumi".</p>

    <div class="card" id="loginCard">
      <div id="loginError" class="error" style="display:none">Password salah.</div>
      <label for="passwordInput">Masukkan Password Admin</label>
      <input type="password" id="passwordInput" autocomplete="off">
      <button id="loginBtn">Masuk</button>
    </div>

    <div id="dashboard" style="display:none">
      <div class="top-row">
        <span class="tag green" id="storageMode">Mode: -</span>
        <div>
          <button id="refreshBtn" class="secondary" style="background:transparent;color:var(--green-dark);border:2px solid var(--green-dark);">Muat Ulang</button>
          <button id="exportBtn">Unduh CSV</button>
        </div>
      </div>

      <div class="card">
        <div id="summary" style="margin-bottom:14px;font-weight:600;"></div>
        <div style="overflow-x:auto;">
          <table id="scoreTable">
            <thead>
              <tr>
                <th>#</th>
                <th>Nama</th>
                <th>Skor</th>
                <th>Persentase</th>
                <th>Waktu</th>
              </tr>
            </thead>
            <tbody id="scoreBody"></tbody>
          </table>
        </div>
        <p id="emptyNote" class="small-note" style="display:none">Belum ada peserta yang mengisi quiz.</p>
      </div>
    </div>

    <p class="footer-note"><a href="index.html" style="color:#999;">Kembali ke Beranda</a></p>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="app.js"></script>
  <script src="admin-config.js"></script>
  <script>
    const loginCard = document.getElementById("loginCard");
    const dashboard = document.getElementById("dashboard");
    const passwordInput = document.getElementById("passwordInput");
    const loginError = document.getElementById("loginError");

    function login() {
      if (passwordInput.value === ADMIN_PASSWORD) {
        loginCard.style.display = "none";
        dashboard.style.display = "block";
        loadScores();
      } else {
        loginError.style.display = "block";
      }
    }

    document.getElementById("loginBtn").addEventListener("click", login);
    passwordInput.addEventListener("keydown", (e) => { if (e.key === "Enter") login(); });

    let currentScores = [];

    async function loadScores() {
      document.getElementById("storageMode").textContent = usingSharedStorage()
        ? "Mode: Firebase (data semua peserta)"
        : "Mode: Lokal (hanya perangkat ini)";

      currentScores = await getAllScores();
      renderTable(currentScores);
    }

    function renderTable(scores) {
      const body = document.getElementById("scoreBody");
      const emptyNote = document.getElementById("emptyNote");
      body.innerHTML = "";

      if (scores.length === 0) {
        emptyNote.style.display = "block";
      } else {
        emptyNote.style.display = "none";
      }

      scores.forEach((s, i) => {
        const tr = document.createElement("tr");
        const time = s.timestamp ? new Date(s.timestamp).toLocaleString("id-ID") : "-";
        tr.innerHTML = `
          <td>${i + 1}</td>
          <td>${escapeHtml(s.name)}</td>
          <td>${s.score} / ${s.total}</td>
          <td>${s.percentage}%</td>
          <td>${time}</td>
        `;
        body.appendChild(tr);
      });

      const avg = scores.length
        ? Math.round(scores.reduce((sum, s) => sum + s.percentage, 0) / scores.length)
        : 0;
      document.getElementById("summary").textContent =
        "Total peserta: " + scores.length + " | Rata-rata skor: " + avg + "%";
    }

    function escapeHtml(str) {
      const div = document.createElement("div");
      div.textContent = str;
      return div.innerHTML;
    }

    document.getElementById("refreshBtn").addEventListener("click", loadScores);

    document.getElementById("exportBtn").addEventListener("click", () => {
      if (currentScores.length === 0) return;
      const header = "Nama,Skor,Total,Persentase,Waktu\n";
      const rows = currentScores.map((s) => {
        const time = s.timestamp ? new Date(s.timestamp).toLocaleString("id-ID") : "-";
        return `"${s.name}",${s.score},${s.total},${s.percentage}%,"${time}"`;
      });
      const csv = header + rows.join("\n");
      const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "skor_quiz_dari_rumah_untuk_bumi.csv";
      a.click();
      URL.revokeObjectURL(url);
    });
  </script>
</body>
</html>
